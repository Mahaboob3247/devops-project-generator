<!DOCTYPE html>
<html>

<head>
    <title>DevOps Project Generator</title>

    <link rel="stylesheet" href="style.css">

    <!-- DevOps Icons -->
    <script src="https://kit.fontawesome.com/4b8f4c8b6c.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="container">

<h1>⚙️ DevOps Project Generator</h1>

<p>Create a production-ready DevOps project instantly</p>

<div class="card">

<label>Programming Language</label>
<select id="language">
<option value="node">Node.js</option>
<option value="python">Python</option>
</select>


<label>CI/CD Tool</label>
<select id="cicd">
<option value="github">GitHub Actions</option>
<option value="jenkins">Jenkins</option>
</select>


<div class="options">

<div class="option">
<i class="fab fa-docker"></i>
<label>
<input type="checkbox" id="docker">
Docker
</label>
</div>

<div class="option">
<i class="fas fa-dharmachakra"></i>
<label>
<input type="checkbox" id="kubernetes">
Kubernetes
</label>
</div>

</div>


<button onclick="generateProject()" id="generateBtn">
🚀 Generate Project
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
