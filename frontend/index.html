<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Project Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🚀 DevOps Project Generator</h1>
<p class="subtitle">Generate production-ready DevOps repositories instantly</p>

<div class="card">

<div class="form-group">
<label>Project Name</label>
<input type="text" id="projectName" placeholder="my-devops-app">
</div>

<div class="form-group">
<label>Language</label>
<select id="language">
<option value="node">Node.js</option>
<option value="python">Python</option>
<option value="java">Java</option>
<option value="go">Go</option>
</select>
</div>

<div class="form-group">
<label>CI/CD</label>
<select id="cicd">
<option value="jenkins">Jenkins</option>
<option value="github">GitHub Actions</option>
</select>
</div>

<div class="checkbox-grid">

<label class="toggle">
<input type="checkbox" id="docker">
<span class="slider"></span>
Docker
</label>

<label class="toggle">
<input type="checkbox" id="kubernetes">
<span class="slider"></span>
Kubernetes
</label>

<label class="toggle">
<input type="checkbox" id="terraform">
<span class="slider"></span>
Terraform
</label>

</div>

<button class="generate-btn" onclick="generateProject()">
Generate DevOps Project
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
